<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Enterprise Multi-Step Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-card">
    <div class="steps-indicator">
        <div class="step-dot active" id="dot-1">1</div>
        <div class="step-dot" id="dot-2">2</div>
        <div class="step-dot" id="dot-3">3</div>
    </div>

    <form id="regForm">
        <div class="form-step active" id="step-1">
            <h2>Personal Information</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe">
                <div class="error-msg" id="err-name"></div>
            </div>
            <div class="form-group">
                <label>Age</label>
                <input type="number" id="age" placeholder="25">
                <div class="error-msg" id="err-age"></div>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="1234567890"> 
                <div class="error-msg" id="err-phone"></div>
            </div>
            <div class="btn-row">
                <button type="button" class="btn btn-next" id="btn-next-1">Continue →</button>
            </div>
        </div>

        <div class="form-step" id="step-2">
            <h2>Account Credentials</h2>
            <div class="form-group">
                <label>Email Address</label>
                <input type="text" id="email" placeholder="john@example.com">
                <div class="error-msg" id="err-email"></div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
                <div class="strength-meter" id="strength-meter"></div>
                <div class="error-msg" id="err-password"></div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
                <div class="error-msg" id="err-confirmPassword"></div>
            </div>
            <div class="btn-row">
                <button type="button" class="btn btn-prev" id="btn-back-2">Back</button>
                <button type="button" class="btn btn-next" id="btn-next-2">Continue →</button>
            </div>
        </div>

        <div class="form-step" id="step-3">
            <h2>Confirm & Submit</h2>
            <div class="summary-box" id="summary-content"></div>
            <div class="btn-row">
                <button type="button" class="btn btn-prev" id="btn-back-3">Back</button>
                <button type="button" class="btn btn-next" style="background:#10b981" id="btn-submit">Complete Registration ✓</button>
            </div>
        </div>
    </form>
</div>

<div class="table-container">
    <h3 style="margin-bottom: 20px; font-size: 1.2rem; font-weight: 700;">Active Account Registries</h3>
    <table>
        <thead>
            <tr>
                <th>User Profile Name</th>
                <th>Age</th>
                <th>Phone Number</th>
                <th>Registered Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="db-table-body"></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
